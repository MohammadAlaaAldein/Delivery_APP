<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header">
                <h5>{{ 'shops.my_shop' | translate }}</h5>
            </div>
            <div class="card-body">
                @if (isLoading) {
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                } @else {
                <form [formGroup]="firstFormGroup" (ngSubmit)="onSubmit()">
                    <app-form-builder [fields]="fields" [formGroup]="firstFormGroup" [formFieldsList]="formFieldsList"
                        [translationKey]="'shops'"></app-form-builder>

                    <div class="alert alert-info mt-3">
                        <i class="feather icon-info me-2"></i>
                        {{ 'shops.company_ids_readonly_info' | translate }}
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="submit" class="btn btn-primary" [disabled]="firstFormGroup.pristine">
                            {{ 'g.save' | translate }}
                        </button>
                    </div>
                </form>
                }
            </div>
        </div>
    </div>
</div>

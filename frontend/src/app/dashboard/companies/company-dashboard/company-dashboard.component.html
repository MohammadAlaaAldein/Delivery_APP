<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header">
                <h5>{{ 'companies.my_company' | translate }}</h5>
            </div>
            <div class="card-body">
                @if (isLoading) {
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                } @else {
                <app-form-builder [fields]="fields" [formGroup]="firstFormGroup" [formFieldsList]="formFieldsList"
                    [translationKey]="'companies'" (submit)="onSubmit()" (backClicked)="onCancel()">
                </app-form-builder>

                <div class="alert alert-info mt-3">
                    <i class="feather icon-info me-2"></i>
                    {{ 'companies.shop_ids_readonly_info' | translate }}
                </div>
                }
            </div>
        </div>
    </div>
</div>

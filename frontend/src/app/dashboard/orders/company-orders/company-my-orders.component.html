<div class="row">
    <div class="col-sm-12 mb-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>{{ 'orders.my_company_orders' | translate }}</h5>
                <div class="d-flex gap-2 align-items-center">
                    <select class="form-select" [(ngModel)]="selectedStatus" (change)="onStatusChange()"
                        style="width: 200px;">
                        <option *ngFor="let opt of statusOptions" [value]="opt.value">
                            {{ opt.value ? ('orders.status.' + opt.value | translate) : ('g.all' | translate) }}
                        </option>
                    </select>
                </div>
            </div>
            <div class="card-body custom-table-style">
                <sct-custom-table [columnsConfig]="columnConfig" [data]="tableData"
                    [config]="tableConfig"></sct-custom-table>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-header">
                <h5>{{ 'drivers.my_profile' | translate }}</h5>
                @if (driverName) {
                <p class="text-muted mb-0">{{ driverName }}</p>
                }
            </div>
            <div class="card-body">
                @if (isLoading) {
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                } @else {
                <app-form-builder [formGroup]="firstFormGroup" [formFieldsList]="formFieldsList" [fields]="fields" (submit)="onSubmit()"
                    [translationKey]="'drivers'" [hasButtons]="true" (backClicked)="onCancel()">
                </app-form-builder>
                }
            </div>
        </div>
    </div>
</div>

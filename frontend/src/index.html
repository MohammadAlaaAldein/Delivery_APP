		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());

			gtag('config', 'G-1TZ5NXZME2');

			// Clean up old URLs with hash
			(function cleanHashUrl() {
				const { hash, origin, pathname, search } = window.location;
				if (hash.startsWith('#/')) {
					const newUrl = `${origin}${pathname}${search}${hash.slice(1)}`;
					window.location.replace(newUrl);
				}
			})();
		</script>
